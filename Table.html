<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiny Tot's Daycare Weekly Food Menu</title>
    <style>
        /* BASE SETTINGS */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: "Times New Roman", Times, serif;
            overflow: hidden; /* Prevents scrolling on the screen */
        }

        .container {
            display: flex;
            flex-direction: column;
            width: 98vw;
            height: 100vh;
            margin: 0 auto;
            padding: 10px;
            box-sizing: border-box;
            background: white;
        }

        h1 {
            text-align: center;
            font-size: 32pt;
            margin: 5px 0 15px 0;
            font-weight: bold;
        }

        /* THE TABLE - FORCE EQUAL SIZES */
        table {
            width: 100%;
            margin: 0 auto;
            border-collapse: collapse;
            table-layout: fixed; /* Equal column widths */
            border: 2px solid black;
        }

        /* This forces every row to be exactly the same height */
        tr {
            height: 16vh; 
        }

        th, td {
            border: 2px solid black;
            padding: 10px;
            vertical-align: top;
            text-align: left;
            font-size: 16pt;
            overflow: hidden; /* Prevents text from pushing the cell taller */
            word-wrap: break-word;
        }

        th {
            text-align: center;
            font-size: 18pt;
            vertical-align: middle;
        }

        .row-label {
            width: 130px;
            font-weight: bold;
            vertical-align: middle;
            text-align: left;
        }

        /* EDITABLE AREA */
        .editable {
            height: 100%;
            width: 100%;
            outline: none;
            white-space: pre-wrap;
        }

        /* DATE PICKER */
        .date-container {
            font-size: 14pt;
            text-align: left;
            font-weight: bold;
        }
        input[type="date"] {
            font-family: inherit;
            font-size: 12pt;
            width: 95%;
            margin-top: 5px;
        }
        #date-display { display: none; }

        /* BUTTONS - SIMPLE GRAY */
        .controls {
            padding: 15px 0;
            text-align: center;
        }
        button {
            padding: 8px 20px;
            font-size: 14pt;
            margin: 0 10px;
            cursor: pointer;
            border: 1px solid #777;
            background: #efefef;
            color: black;
            border-radius: 2px;
        }
        button:hover { background: #e0e0e0; }

        /* PRINT SETTINGS - FULL PAGE LANDSCAPE */
        @media print {
            @page {
                size: landscape;
                margin: .5in;
            }
            body, .container { 
                height: auto; 
                width: 100%; 
                margin: 0; 
                padding: 1; 
            }
            .controls, input[type="date"] { display: none; }
            #date-display { display: block; font-weight: normal; margin-top: 5px; }
            
            /* Ensure rows take up the whole printed page height */
            tr { height: 1.5in; } 
            h1 { margin-top: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Tiny Tot's Daycare Weekly Food Menu</h1>

    <table id="menuTable">
        <thead>
            <tr>
                <th class="row-label">
                    <div class="date-container">
                        Week of:<br>
                        <input type="date" id="weekPicker">
                        <div id="date-display"></div>
                    </div>
                </th>
                <th>Monday</th>
                <th>Tuesday</th>
                <th>Wednesday</th>
                <th>Thursday</th>
                <th>Friday</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="row-label">Breakfast</td>
                <td class="editable" contenteditable="true" id="c1"></td>
                <td class="editable" contenteditable="true" id="c2"></td>
                <td class="editable" contenteditable="true" id="c3"></td>
                <td class="editable" contenteditable="true" id="c4"></td>
                <td class="editable" contenteditable="true" id="c5"></td>
            </tr>
            <tr>
                <td class="row-label">Lunch</td>
                <td class="editable" contenteditable="true" id="c6"></td>
                <td class="editable" contenteditable="true" id="c7"></td>
                <td class="editable" contenteditable="true" id="c8"></td>
                <td class="editable" contenteditable="true" id="c9"></td>
                <td class="editable" contenteditable="true" id="c10"></td>
            </tr>
            <tr>
                <td class="row-label">Snack</td>
                <td class="editable" contenteditable="true" id="c11"></td>
                <td class="editable" contenteditable="true" id="c12"></td>
                <td class="editable" contenteditable="true" id="c13"></td>
                <td class="editable" contenteditable="true" id="c14"></td>
                <td class="editable" contenteditable="true" id="c15"></td>
            </tr>
            <tr>
                <td class="row-label">Drinks</td>
                <td class="editable" contenteditable="true" id="c16">Water/Milk</td>
                <td class="editable" contenteditable="true" id="c17">Water/Milk</td>
                <td class="editable" contenteditable="true" id="c18">Water/Milk</td>
                <td class="editable" contenteditable="true" id="c19">Water/Milk</td>
                <td class="editable" contenteditable="true" id="c20">Water/Milk</td>
            </tr>
        </tbody>
    </table>

    <div class="controls">
        <button onclick="clearMenu()">Clear All Items</button>
        <button onclick="window.print()">Print Menu</button>
    </div>
</div>

<script>
    const cells = document.querySelectorAll('.editable');
    const picker = document.getElementById('weekPicker');
    const display = document.getElementById('date-display');

    // Load saved data
    window.onload = () => {
        cells.forEach(c => {
            const val = localStorage.getItem(c.id);
            if (val !== null) c.innerText = val;
        });
        const d = localStorage.getItem('menuDate');
        if (d) {
            picker.value = d;
            updateDateLabel(d);
        }
    };

    // Save as you type
    cells.forEach(c => {
        c.addEventListener('input', () => {
            localStorage.setItem(c.id, c.innerText);
        });
    });

    picker.addEventListener('change', () => {
        localStorage.setItem('menuDate', picker.value);
        updateDateLabel(picker.value);
    });

    function updateDateLabel(val) {
        const p = val.split('-');
        if(p.length === 3) display.innerText = `${p[1]}/${p[2]}/${p[0]}`;
    }

    function clearMenu() {
        if (confirm("Clear the menu?")) {
            cells.forEach(c => {
                c.innerText = c.id.match(/c1[6-9]|c20/) ? "Water/Milk" : "";
                localStorage.setItem(c.id, c.innerText);
            });
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tiny Tot's Daycare Weekly Food Menu</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        margin: 16px;
      }

      table {
        width: 100%;
        table-layout: fixed;
        border-collapse: collapse;
      }

      th,
      td {
        border: 1px solid #000;
        padding: 6px;
        font-size: 13px;
        line-height: 1.15;
        vertical-align: top;
        text-align: left;
      }

      th {
        background-color: #f2f2f2;
        text-align: center;
        font-weight: bold;
      }

      td:first-child {
        font-weight: bold;
        width: 110px;
      }

      /* Cell display */
      .cell-content div {
        padding: 1px 0;
        white-space: nowrap;
      }

      .placeholder {
        color: #aaa;
        font-size: 12px;
      }

      /* Editable textarea */
      .cell-editor {
        width: 100%;
        height: 56px;
        resize: none;
        border: none;
        outline: none;
        font-family: inherit;
        font-size: 12px;
        line-height: 1.15;
        padding: 2px;
      }

      .date-input {
        width: 100%;
        border: none;
        font-size: 12px;
      }

      /* ---------- PRINT ---------- */
      @page {
        margin: 0.5in;
      }

      @media print {
        body {
          margin: 0;
        }

        th,
        td {
          padding: 4px;
          font-size: 11px;
        }

        h1 {
          font-size: 16px;
          margin-bottom: 6px;
        }

        .cell-editor {
          height: 48px;
          font-size: 11px;
        }

        .no-print {
          display: none !important;
        }
      }
    </style>
  </head>

  <body>
    <div id="header-content" style="text-align: center; margin-bottom: 8px">
      <h1>Tiny Tot's Daycare Weekly Food Menu</h1>
    </div>

    <div id="menu-container">
      <table>
        <thead>
          <tr>
            <th style="text-align: left">
              Week of:
              <input type="date" class="date-input" />
            </th>
            <th>Monday</th>
            <th>Tuesday</th>
            <th>Wednesday</th>
            <th>Thursday</th>
            <th>Friday</th>
          </tr>
        </thead>
        <tbody id="menu-table-body"></tbody>
      </table>
    </div>

    <div class="no-print" style="margin-top: 12px">
      <button onclick="clearAllItems()">Clear All Items</button>
      <button onclick="printMenu()" style="margin-left: 10px">
        Print Menu
      </button>
    </div>

    <script src="menu2.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tiny Tot's Daycare Weekly Food Menu</title>
  <style>

    table {
        width: 100%; 
        height: 80vh; /* This makes the table expand vertically */
      }

    th, td {
      border: 1px solid #000;
      padding: 8px;
      vertical-align: top;
      text-align: left; /* left align content */
      font-size: 14px;
    }

    th {
      background-color: #f2f2f2;
      text-align: center;
    }

    td input {
      width: 95%;
      border: none;
      outline: none;
      font-size: 14px;
      font-family: inherit;
    }

    /* Print styling */
    @media print {
      body * { visibility: hidden; }
      #header-content, #header-content *,
      #menu-container, #menu-container * {
        visibility: visible;
      }
      #header-content {
        position: absolute; top: 0; left: 0; width: 100%;
        text-align: center;
      }
      #menu-container {
        position: absolute; top: 80px; left: 0; width: 100%;
      }
      table { width: 100%; border-collapse: collapse; }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="header-content">
    <h1>Tiny Tot's Daycare Weekly Food Menu</h1>
    <div style="text-align:left; margin:10px 0;">
      
    </div>
  </div>

  <div id="menu-container">
    <table>
      <thead>
        <tr>
          <th style="width:120px; text-align:left">Week of: <input type= "date" id="weekDate" class="date-input" onchange="updateWeek()"></th>
          <th>Monday</th>
          <th>Tuesday</th>
          <th>Wednesday</th>
          <th>Thursday</th>
          <th>Friday</th>
        </tr>
      </thead>
      <tbody id="menu-table-body"></tbody>
    </table>
  </div>

  <div style="margin-top:20px;">
    <button onclick="clearAllItems()">Clear All Items</button>
    <button onclick="printMenu()" style="margin-left:10px;">Print Menu</button>
  </div>

  <script src="menu2.js"></script>
</body>
</html>
